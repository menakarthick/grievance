name: grievance-platform

services:
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: grievance-platform-backend:local
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./src/config/keys:/app/backend/src/config/keys:ro
      - backend_logs:/app/backend/logs
      - backend_uploads:/app/backend/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grievance-net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-grievance_platform}
      MYSQL_USER: ${DB_USER:-grievance_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD:-change-me-root}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grievance-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grievance-net

volumes:
  mysql_data:
  redis_data:
  backend_logs:
  backend_uploads:

networks:
  grievance-net:
    driver: bridge
