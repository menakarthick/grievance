/api/v1/reports/export:
  get:
    operationId: reportExport
    tags: [Reports]
    summary: Export Report
    description: >-
      Export any report in Sections 9.2-9.9 as PDF, Excel, or CSV. Large
      exports are generated asynchronously via the Scheduler; the
      resulting artifact is a file_asset, retrieved via Download Export.
      09-Reports-APIs.md Section 9.10.1.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      - name: reportType
        in: query
        required: true
        schema: { type: string }
      - $ref: './components/parameters.yaml#/reportFormat'
    responses:
      '202':
        description: Export job queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: './components/schemas.yaml#/AsyncJob'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '429':
        $ref: './components/responses.yaml#/TooManyRequests'

/api/v1/reports/export/{exportJobId}:
  parameters:
    - name: exportJobId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: reportGetExportStatus
    tags: [Reports]
    summary: Get Export Job Status
    description: >-
      Poll the status of an asynchronous report export job.
      09-Reports-APIs.md Section 9.10.2.
    responses:
      '200':
        description: Export job status.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: './components/schemas.yaml#/ReportExport'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/reports/export/{exportJobId}/download:
  parameters:
    - name: exportJobId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: reportDownloadExport
    tags: [Reports]
    summary: Download Export
    description: >-
      Retrieve the completed export artifact via a short-lived, signed
      URL. Delegates entirely to the File Download endpoint once the
      underlying fileAssetId is resolved. 09-Reports-APIs.md Section
      9.10.3.
    responses:
      '302':
        description: Redirect to a signed download URL.
      '200':
        description: JSON signed-URL response (when Accept is application/json).
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        downloadUrl: { type: string }
                        expiresAt: { type: string, format: date-time }
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: EXPORT_NOT_YET_COMPLETE.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/report-schedules:
  get:
    operationId: reportListSchedules
    tags: [Reports]
    summary: List Scheduled Reports
    description: >-
      Retrieve the tenant's configured recurring report schedules.
      09-Reports-APIs.md Section 9.11.1.
    parameters:
      - name: reportType
        in: query
        schema: { type: string }
      - name: isActive
        in: query
        schema: { type: boolean, default: true }
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: Scheduled report list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportSchedule'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
  post:
    operationId: reportCreateSchedule
    tags: [Reports]
    summary: Create Scheduled Report
    description: >-
      Define a new recurring report generation + email-delivery
      schedule. The Scheduler picks up active schedules and internally
      invokes the Export Report pipeline, then dispatches the resulting
      artifact via the Email channel. 09-Reports-APIs.md Section 9.11.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reportType, cronExpression, format, recipientEmails]
            properties:
              reportType: { type: string }
              filters: { type: object }
              cronExpression: { type: string }
              format: { type: string, enum: [csv, pdf, xlsx] }
              recipientEmails:
                type: array
                items: { type: string, format: email }
                minItems: 1
                maxItems: 50
    responses:
      '201':
        description: Scheduled report created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportSchedule'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: REPORT_TYPE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/report-schedules/{scheduleId}:
  parameters:
    - name: scheduleId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: reportGetSchedule
    tags: [Reports]
    summary: Get Scheduled Report
    description: >-
      Retrieve a single scheduled report's configuration.
      09-Reports-APIs.md Section 9.11.3.
    responses:
      '200':
        description: Scheduled report detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportScheduleDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  patch:
    operationId: reportUpdateSchedule
    tags: [Reports]
    summary: Update Scheduled Report
    description: >-
      Change a schedule's cron expression, recipients, format, or active
      state. Optimistic concurrency: a version mismatch returns 409
      rather than silently overwriting a concurrent edit.
      09-Reports-APIs.md Section 9.11.4.
    parameters:
      - $ref: '#/components/parameters/IfMatchHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [expectedVersion]
            properties:
              cronExpression: { type: string }
              recipientEmails:
                type: array
                items: { type: string, format: email }
              format: { type: string, enum: [csv, pdf, xlsx] }
              isActive: { type: boolean }
              expectedVersion: { type: integer }
    responses:
      '200':
        description: Scheduled report updated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportScheduleDetail'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        $ref: './components/responses.yaml#/Conflict'
  delete:
    operationId: reportDeleteSchedule
    tags: [Reports]
    summary: Delete Scheduled Report (Deactivate)
    description: >-
      Soft-delete (deactivate) a scheduled report. A deactivated
      schedule is excluded from the Scheduler's next run without
      affecting reports already dispatched historically.
      09-Reports-APIs.md Section 9.11.5.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/report-templates:
  get:
    operationId: reportListTemplates
    tags: [Reports]
    summary: List Report Templates
    description: >-
      Retrieve saved report templates (filter/column presets).
      09-Reports-APIs.md Section 9.12.1.
    parameters:
      - name: reportType
        in: query
        schema: { type: string }
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: Report template list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportTemplateSummary'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
  post:
    operationId: reportCreateTemplate
    tags: [Reports]
    summary: Create Report Template
    description: >-
      Save the current filter/column/sort configuration of a report as
      a reusable named template. Private to its creator by default;
      visibility to others is granted via Report Sharing.
      09-Reports-APIs.md Section 9.12.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, reportType]
            properties:
              name: { type: string }
              reportType: { type: string }
              savedFilters: { type: object }
              savedColumns:
                type: array
                items: { type: string }
              savedSort: { type: string }
    responses:
      '201':
        description: Report template created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportTemplateSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '409':
        description: TEMPLATE_NAME_ALREADY_EXISTS.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/report-templates/{reportTemplateId}:
  parameters:
    - name: reportTemplateId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: reportGetTemplate
    tags: [Reports]
    summary: Get Report Template
    description: >-
      Retrieve a single saved report template. Access check covers both
      ownership and share grants. 09-Reports-APIs.md Section 9.12.3.
    responses:
      '200':
        description: Report template detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportTemplateDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  patch:
    operationId: reportUpdateTemplate
    tags: [Reports]
    summary: Update Report Template
    description: >-
      Change a saved template's filters/columns/sort - creates a new
      version. Creator-only write access - sharing grants read, never
      write. Optimistic concurrency: version mismatch returns 409.
      09-Reports-APIs.md Section 9.12.4.
    parameters:
      - $ref: '#/components/parameters/IfMatchHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [expectedVersion]
            properties:
              savedFilters: { type: object }
              savedColumns:
                type: array
                items: { type: string }
              savedSort: { type: string }
              expectedVersion: { type: integer }
    responses:
      '200':
        description: Report template updated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportTemplateDetail'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        $ref: './components/responses.yaml#/Conflict'
  delete:
    operationId: reportDeleteTemplate
    tags: [Reports]
    summary: Delete Report Template
    description: >-
      Remove a saved report template. Also revokes any outstanding
      shares of this template. 09-Reports-APIs.md Section 9.12.5.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/reports/{reportInstanceId}/shares:
  parameters:
    - name: reportInstanceId
      in: path
      required: true
      description: An exportJobId's resulting fileAssetId, or a reportTemplateId.
      schema: { type: string }
  post:
    operationId: reportShareCreate
    tags: [Reports]
    summary: Share Report
    description: >-
      Grant another user (or a saved Report Template) access to a
      completed report export or a saved template. Sharing never
      bypasses the recipient's own RBAC scope for the underlying data,
      and is never permitted across tenants, even for Super Admin.
      09-Reports-APIs.md Section 9.13.1.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [sharedEntityType, grantedToUserId]
            properties:
              sharedEntityType: { type: string, enum: [file_asset, report_template] }
              grantedToUserId: { type: string }
              expiresAt: { type: string, format: date-time }
    responses:
      '201':
        description: Share grant created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportShare'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  get:
    operationId: reportShareList
    tags: [Reports]
    summary: List Report Shares
    description: >-
      Retrieve every outstanding share grant for a report export or
      template. 09-Reports-APIs.md Section 9.13.2.
    responses:
      '200':
        description: Report share list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportShareListItem'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/reports/{reportInstanceId}/shares/{shareId}:
  parameters:
    - name: reportInstanceId
      in: path
      required: true
      schema: { type: string }
    - name: shareId
      in: path
      required: true
      schema: { type: string }
  delete:
    operationId: reportShareRevoke
    tags: [Reports]
    summary: Revoke Report Share
    description: >-
      Remove a previously granted share. Revocation takes effect
      immediately - the recipient's next access attempt returns 403.
      09-Reports-APIs.md Section 9.13.3.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/report-permissions:
  get:
    operationId: reportGetPermissionMatrix
    tags: [Reports]
    summary: Get Report Permission Matrix
    description: >-
      Retrieve which roles are granted which report-related permissions.
      09-Reports-APIs.md Section 9.14.1.
    parameters:
      - name: roleId
        in: query
        schema: { type: string }
    responses:
      '200':
        description: Report permission matrix.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportPermissionMatrixRow'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
  patch:
    operationId: reportUpdatePermission
    tags: [Reports]
    summary: Update Report Permission
    description: >-
      Grant or revoke a report-related permission for a role. A thin
      convenience wrapper equivalent to PATCH /api/v1/roles/{roleId}
      scoped to report:* permissions - it does not introduce a second
      permission-grant mechanism. Naturally idempotent.
      09-Reports-APIs.md Section 9.14.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [roleId, permissionKey, action]
            properties:
              roleId: { type: string }
              permissionKey: { type: string }
              action: { type: string, enum: [grant, revoke] }
    responses:
      '200':
        description: Permission grant/revoke result.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        roleId: { type: string }
                        permissionKey: { type: string }
                        granted: { type: boolean }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/reports/statistics/usage:
  get:
    operationId: reportGetUsageStatistics
    tags: [Reports]
    summary: Get Report Usage Statistics
    description: >-
      Which reports are run most frequently, by whom, for Reports Portal
      usage analysis and capacity planning. 09-Reports-APIs.md Section
      9.15.1.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - name: reportType
        in: query
        schema: { type: string }
    responses:
      '200':
        description: Report usage statistics.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportUsageRow'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

components:
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Optional on the Export Report request to prevent duplicate
        export jobs on client retry (09-Reports-APIs.md Section 9.10.1).
      schema:
        type: string
    IfMatchHeader:
      name: If-Match
      in: header
      required: true
      description: >-
        Optimistic-concurrency precondition carrying the caller's
        last-known version, required on Update Scheduled Report and
        Update Report Template (09-Reports-APIs.md Sections 9.11.4,
        9.12.4).
      schema:
        type: string
  schemas:
    Widget:
      type: object
      properties:
        widgetKey: { type: string }
        chartType: { type: string, enum: [line, bar, pie, heatmap, table] }
        data: {}
        generatedAt: { type: string, format: date-time }
    WidgetCatalogEntry:
      type: object
      properties:
        widgetKey: { type: string }
        title: { type: string }
        chartType: { type: string, enum: [line, bar, pie, heatmap, table] }
        requiredPermission: { type: string }
    ComplaintSummaryReportRow:
      type: object
      properties:
        departmentId: { type: string }
        categoryId: { type: string }
        wardId: { type: string }
        registeredCount: { type: integer }
        resolvedCount: { type: integer }
        breachedCount: { type: integer }
    TrendChart:
      type: object
      properties:
        chartType: { type: string, enum: [line] }
        series:
          type: array
          items:
            type: object
            properties:
              seriesKey: { type: string }
              points:
                type: array
                items:
                  type: object
                  properties:
                    date: { type: string, format: date }
                    value: { type: number }
    CategoryBreakdownChart:
      type: object
      properties:
        chartType: { type: string, enum: [pie] }
        data:
          type: array
          items:
            type: object
            properties:
              categoryName: { type: string }
              count: { type: integer }
              percentOfTotal: { type: number }
    SlaComplianceRow:
      type: object
      properties:
        departmentId: { type: string }
        categoryId: { type: string }
        complianceRatePercent: { type: number }
        totalComplaints: { type: integer }
        compliantCount: { type: integer }
    SlaBreachRow:
      type: object
      properties:
        complaintId: { type: string }
        trackingId: { type: string }
        dueAt: { type: string, format: date-time }
        breachedAt: { type: string, format: date-time }
        escalatedTo: { type: [string, "null"] }
    OfficerPerformanceRow:
      type: object
      properties:
        officerId: { type: string }
        weekStartDate: { type: string, format: date }
        assignedCount: { type: integer }
        resolvedCount: { type: integer }
        overdueCount: { type: integer }
    OfficerLeaderboardRow:
      type: object
      properties:
        officerId: { type: string }
        officerName: { type: string }
        resolvedCount: { type: integer }
        slaCompliancePercent: { type: number }
        rank: { type: integer }
    OfficerDrillDownItem:
      type: object
      properties:
        id: { type: string }
        trackingId: { type: string }
        statusLabel: { type: string }
        assignedAt: { type: string, format: date-time }
        slaDueAt: { type: [string, "null"], format: date-time }
    DepartmentPerformanceRow:
      type: object
      properties:
        departmentId: { type: string }
        registeredCount: { type: integer }
        resolvedCount: { type: integer }
        breachRatePercent: { type: number }
        avgResolutionHours: { type: number }
    DepartmentComparisonChart:
      type: object
      properties:
        chartType: { type: string, enum: [bar] }
        data:
          type: array
          items:
            type: object
            properties:
              departmentName: { type: string }
              value: { type: number }
    AiPredictionRow:
      type: object
      properties:
        metricKey: { type: string }
        predictedValue: { type: number }
        confidenceScore: { type: number, minimum: 0, maximum: 1 }
        predictionDate: { type: string, format: date }
    AiClassificationAccuracy:
      type: object
      properties:
        totalClassified: { type: integer }
        overriddenCount: { type: integer }
        overrideRatePercent: { type: number }
        averageConfidenceScore: { type: number, minimum: 0, maximum: 1 }
    CitizenSatisfactionRow:
      type: object
      properties:
        departmentId: { type: string }
        averageRating: { type: number }
        feedbackCount: { type: integer }
        ratingDistribution:
          type: object
          properties:
            '1': { type: integer }
            '2': { type: integer }
            '3': { type: integer }
            '4': { type: integer }
            '5': { type: integer }
    CitizenEngagementSummary:
      type: object
      properties:
        newRegistrations: { type: integer }
        activeComplainants: { type: integer }
        feedbackSubmissionRatePercent: { type: number }
        reopenRatePercent: { type: number }
    ChannelUsageSummary:
      type: object
      properties:
        registrationChannels:
          type: object
          properties:
            text: { type: integer }
            voice: { type: integer }
        notificationChannels:
          type: object
          properties:
            sms: { type: integer }
            email: { type: integer }
            whatsapp: { type: integer }
            push: { type: integer }
    WardWiseRow:
      type: object
      properties:
        wardId: { type: string }
        wardName: { type: string }
        complaintCount: { type: integer }
        categoryBreakdown:
          type: array
          items:
            type: object
            properties:
              categoryName: { type: string }
              count: { type: integer }
    ZoneWiseRow:
      type: object
      properties:
        zoneId: { type: string }
        zoneName: { type: string }
        complaintCount: { type: integer }
        categoryBreakdown:
          type: array
          items:
            type: object
            properties:
              categoryName: { type: string }
              count: { type: integer }
    ReportSchedule:
      type: object
      properties:
        id: { type: string }
        reportType: { type: string }
        cronExpression: { type: string }
        format: { type: string, enum: [csv, pdf, xlsx] }
        recipientEmails:
          type: array
          items: { type: string, format: email }
        isActive: { type: boolean }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
    ReportScheduleDetail:
      type: object
      properties:
        id: { type: string }
        reportType: { type: string }
        filters: { type: object }
        cronExpression: { type: string }
        format: { type: string, enum: [csv, pdf, xlsx] }
        recipientEmails:
          type: array
          items: { type: string, format: email }
        isActive: { type: boolean }
        version: { type: integer }
        lastRunAt: { type: [string, "null"], format: date-time }
        nextRunAt: { type: [string, "null"], format: date-time }
    ReportTemplateSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        reportType: { type: string }
        createdBy: { type: string }
        version: { type: integer }
    ReportTemplateDetail:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        reportType: { type: string }
        savedFilters: { type: object }
        savedColumns:
          type: array
          items: { type: string }
        savedSort: { type: string }
        createdBy: { type: string }
        version: { type: integer }
    ReportShare:
      type: object
      properties:
        shareId: { type: string }
        sharedEntityType: { type: string, enum: [file_asset, report_template] }
        sharedEntityId: { type: string }
        grantedToUserId: { type: string }
        expiresAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    ReportShareListItem:
      type: object
      properties:
        shareId: { type: string }
        grantedToUserId: { type: string }
        grantedToName: { type: string }
        expiresAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    ReportPermissionMatrixRow:
      type: object
      properties:
        roleId: { type: string }
        roleName: { type: string }
        permissions:
          type: array
          items: { type: string }
    ReportUsageRow:
      type: object
      properties:
        reportType: { type: string }
        runCount: { type: integer }
        uniqueUserCount: { type: integer }
        averageResponseTimeMs: { type: number }
