/api/v1/reports/dashboard/executive:
  get:
    operationId: reportGetExecutiveDashboard
    tags: [Reports]
    summary: Get Executive Dashboard
    description: >-
      Role-aware composite dashboard (widget set + KPI summary) for the
      Officer/Admin Portal home screen. 09-Reports-APIs.md Section 9.2.1.
    parameters:
      - $ref: './components/parameters.yaml#/periodStart'
      - $ref: './components/parameters.yaml#/periodEnd'
    responses:
      '200':
        description: Executive dashboard.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        widgets:
                          type: array
                          items:
                            $ref: '#/components/schemas/Widget'
                        kpis:
                          type: array
                          items:
                            $ref: './components/schemas.yaml#/ReportSummary'
                        generatedAt: { type: string, format: date-time }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/dashboard/widgets/{widgetKey}:
  parameters:
    - name: widgetKey
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: reportGetDashboardWidget
    tags: [Reports]
    summary: Get Dashboard Widget Data
    description: >-
      Retrieve a single widget's data in isolation, for a client that
      renders widgets independently/lazily. 09-Reports-APIs.md Section
      9.2.2.
    parameters:
      - $ref: './components/parameters.yaml#/periodStart'
      - $ref: './components/parameters.yaml#/periodEnd'
    responses:
      '200':
        description: Widget data.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Widget'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/reports/dashboard/widgets:
  get:
    operationId: reportListDashboardWidgets
    tags: [Reports]
    summary: List Available Widgets
    description: >-
      Retrieve the catalog of widgets the caller's role is permitted to
      view, for a customizable dashboard layout builder.
      09-Reports-APIs.md Section 9.2.3.
    responses:
      '200':
        description: Widget catalog.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/WidgetCatalogEntry'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'

/api/v1/reports/kpis:
  get:
    operationId: reportGetKpiSummary
    tags: [Reports]
    summary: Get KPI Summary
    description: >-
      Retrieve just the KPI tile values (no chart payloads), for a
      lightweight summary strip. 09-Reports-APIs.md Section 9.2.4.
    parameters:
      - $ref: './components/parameters.yaml#/periodStart'
      - $ref: './components/parameters.yaml#/periodEnd'
    responses:
      '200':
        description: KPI summary.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        kpis:
                          type: array
                          items:
                            $ref: './components/schemas.yaml#/ReportSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/complaints/summary:
  get:
    operationId: reportGetComplaintSummary
    tags: [Reports]
    summary: Complaint Summary Report
    description: >-
      Per-department/category/ward complaint counts by status for a
      period. 09-Reports-APIs.md Section 9.3.1.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/departmentId'
      - $ref: './components/parameters.yaml#/wardId'
      - $ref: './components/parameters.yaml#/sort'
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: Complaint summary rows.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ComplaintSummaryReportRow'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/complaints/trend:
  get:
    operationId: reportGetComplaintTrend
    tags: [Reports]
    summary: Complaint Trend Report
    description: >-
      Time-series complaint volume/resolution trend for line-chart
      rendering. 09-Reports-APIs.md Section 9.3.2.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - name: granularity
        in: query
        schema: { type: string, enum: [daily, weekly, monthly], default: daily }
      - $ref: './components/parameters.yaml#/departmentId'
    responses:
      '200':
        description: Complaint trend series.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/TrendChart'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/complaints/category-breakdown:
  get:
    operationId: reportGetCategoryBreakdown
    tags: [Reports]
    summary: Complaint Category Breakdown Report
    description: >-
      Category-wise share of complaint volume, for pie/donut-chart
      rendering. 09-Reports-APIs.md Section 9.3.3.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/departmentId'
    responses:
      '200':
        description: Category breakdown chart.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/CategoryBreakdownChart'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/complaints/summary/drill-down:
  get:
    operationId: reportGetComplaintSummaryDrillDown
    tags: [Reports]
    summary: Complaint Drill-Down
    description: >-
      Drill-through from a Complaint Summary Report row to the
      underlying list of individual complaints - the same underlying
      query as GET /complaints (API_SPECIFICATION.md Section 4.8) with a
      report-context wrapper. 09-Reports-APIs.md Section 9.3.4.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/departmentId'
      - name: categoryId
        in: query
        schema: { type: string }
      - $ref: './components/parameters.yaml#/wardId'
      - name: statusId
        in: query
        schema: { type: string }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Complaint list, identical shape to the Complaint List endpoint.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: './components/schemas.yaml#/ComplaintSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/sla/compliance:
  get:
    operationId: reportGetSlaCompliance
    tags: [Reports]
    summary: SLA Compliance Report
    description: >-
      Percentage of complaints resolved within their pinned SLA window,
      per department/category. Compliance is computed against each
      complaint's originally-pinned sla_rule_config version, never
      against whatever SLA rule is active today. 09-Reports-APIs.md
      Section 9.4.1.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/departmentId'
      - name: categoryId
        in: query
        schema: { type: string }
    responses:
      '200':
        description: SLA compliance rows.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/SlaComplianceRow'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

