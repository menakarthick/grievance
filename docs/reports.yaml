      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/reports/department-performance/comparison:
  get:
    operationId: reportGetDepartmentComparison
    tags: [Reports]
    summary: Department Comparison Report
    description: >-
      Side-by-side comparison of every department's key metrics for a
      period, for bar-chart rendering. Tenant-wide only - a Department
      Admin cannot compare across departments outside their own (403).
      09-Reports-APIs.md Section 9.6.2.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - name: metricKey
        in: query
        schema:
          type: string
          enum: [registeredCount, resolvedCount, breachRatePercent, avgResolutionHours]
    responses:
      '200':
        description: Department comparison chart.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DepartmentComparisonChart'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

