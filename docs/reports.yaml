      complaint content. 09-Reports-APIs.md Section 9.7.2.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/departmentId'
    responses:
      '200':
        description: AI classification accuracy summary.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AiClassificationAccuracy'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

