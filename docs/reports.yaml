/api/v1/reports/department-performance:
  get:
    operationId: reportGetDepartmentPerformance
    tags: [Reports]
    summary: Department Performance Report
    description: >-
      Department-level registered/resolved/SLA-breach-rate rollup over a
      period. 09-Reports-APIs.md Section 9.6.1.
    parameters:
      - $ref: './components/parameters.yaml#/departmentId'
      - $ref: './components/parameters.yaml#/periodStart'
