openapi: 3.1.0
info:
  title: AI Powered Enterprise Citizen Service & Grievance Management Platform API
  version: 1.0.0
  summary: Master OpenAPI 3.1 document assembling the ten module path files and shared components by reference.
  description: >-
    Master, non-inlining OpenAPI 3.1 document for the platform described in
    docs/API_SPECIFICATION.md (Sections 1-16) and docs/Enterprise-API-Endpoint-Catalog.md.
    Every path and every reusable component below is a $ref into an external file;
    this document contains no inline endpoint definitions.
  contact:
    name: Tambaram City Municipal Corporation - Pilot Deployment
  license:
    name: Proprietary - Government of Tamil Nadu Pilot Engagement
externalDocs:
  description: Enterprise API Specification and Endpoint Catalog (design source of truth)
  url: ./API_SPECIFICATION.md
servers:
  - url: https://{tenantHost}/api/v1
    description: Production (per-tenant subdomain, TLS 1.2+/HSTS)
    variables:
      tenantHost:
        default: tambaram.grievance.tn.gov.in
  - url: https://staging.grievance.tn.gov.in/api/v1
    description: Staging / UAT
tags:
  - name: Authentication
    description: Citizen/Officer/Admin login, OTP, MFA, refresh, logout, password reset, token validation.
  - name: Citizen
    description: Citizen self-service profile, preferences, history, dashboard.
  - name: Complaint
    description: Complaint lifecycle from registration through closure/reopen.
  - name: AI
    description: AI Orchestration / Voice Processing Service capabilities.
  - name: Administration
    description: Departments, Categories, Users, Roles, Permissions, Workflow, SLA, Escalation, Configuration, Feature Flags, Providers.
  - name: Geographic
    description: Zones, Wards, GIS boundaries, reverse geocoding, nearby complaints.
  - name: Notification
    description: Channel-agnostic dispatch, templates, delivery history.
  - name: Reports
    description: Dashboards, analytics, daily/monthly/officer/department/SLA reports, export.
  - name: Audit
    description: Audit log, activity log, login history, configuration history.
  - name: File
    description: Upload, download, preview, delete, metadata.
security:
  - bearerAuth: []
