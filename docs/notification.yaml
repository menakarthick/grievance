/api/v1/notifications/{notificationDispatchId}/retry:
  post:
    operationId: notificationRetry
    tags: [Notification]
    summary: Retry Failed Notification
    description: >-
      Manual retry resets automatic backoff and re-attempts at normal
      priority, never silently escalating. 08-Notification-APIs.md
      Section 8.11.1.
    parameters:
      - name: notificationDispatchId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    responses:
      '202':
        description: Notification re-queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        notificationDispatchId: { type: string }
                        status: { type: string, enum: [retried] }
                        retryCount: { type: integer }
                        requeuedAt: { type: string, format: date-time }
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: NOTIFICATION_NOT_RETRYABLE.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notifications/retry/bulk:
  post:
    operationId: notificationBulkRetry
    tags: [Notification]
    summary: Bulk Retry Failed Notifications
    description: >-
      Re-queues every notification matching a filter; matched count
      capped per call (e.g. 10,000). 08-Notification-APIs.md Section
      8.11.2.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [filter]
            properties:
              channel: { type: string }
              filter:
                type: object
                required: [status]
                properties:
                  createdAt:
                    type: object
                    properties:
                      gte: { type: string, format: date-time }
                      lte: { type: string, format: date-time }
                  status: { type: string, enum: [failed, dead_letter] }
    responses:
      '202':
        description: Bulk retry job queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        bulkRetryJobId: { type: string }
                        matchedCount: { type: integer }
                        status: { type: string, enum: [queued] }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '422':
        description: MATCH_COUNT_EXCEEDS_LIMIT.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notifications/{notificationDispatchId}/retries:
  get:
    operationId: notificationGetRetryHistory
    tags: [Notification]
    summary: Get Retry History for a Notification
    description: 08-Notification-APIs.md Section 8.11.3.
    parameters:
      - name: notificationDispatchId
        in: path
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Retry attempt history.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/RetryAttempt'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notification-providers:
  get:
    operationId: notificationListProviders
    tags: [Notification]
    summary: List Notification Providers
    description: >-
      Read-oriented, notification-scoped view of provider_config,
      filtered to sms/email/whatsapp/push. Mutating select-active-
      provider remains PUT /api/v1/providers/{providerType}
      (06-Administration-APIs.md §6.11.2), never duplicated here.
      08-Notification-APIs.md Section 8.12.1.
    parameters:
      - name: channel
        in: query
        schema: { type: string, enum: [sms, email, whatsapp, push] }
    responses:
      '200':
        description: Notification provider list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/NotificationProviderSummary'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/notification-providers/{providerType}:
  parameters:
    - name: providerType
      in: path
      required: true
      schema: { type: string, enum: [sms, email, whatsapp, push] }
  get:
    operationId: notificationGetProvider
    tags: [Notification]
    summary: Get Notification Provider Detail
    description: 08-Notification-APIs.md Section 8.12.2.
    responses:
      '200':
        description: Provider detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/NotificationProviderSummary'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notification-providers/{providerType}/test:
  post:
    operationId: notificationTestProviderConnectivity
    tags: [Notification]
    summary: Test Notification Provider Connectivity
    description: >-
      Connectivity/authentication probe only — never sends a message
      to an end recipient. 08-Notification-APIs.md Section 8.12.3.
    parameters:
      - name: providerType
        in: path
        required: true
