/api/v1/notification-templates:
  get:
    operationId: notificationListTemplates
    tags: [Notification]
    summary: List Notification Templates
    description: 08-Notification-APIs.md Section 8.7.1.
    parameters:
      - name: eventType
        in: query
        schema: { type: string }
      - name: channel
        in: query
        schema: { type: string }
      - name: languageCode
        in: query
        schema: { type: string, enum: [ta, en] }
      - name: approvalStatus
        in: query
        schema:
          type: string
          enum: [draft, pending_approval, approved, rejected]
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: Template list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/TemplateSummary'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
  post:
    operationId: notificationCreateTemplate
    tags: [Notification]
    summary: Create Notification Template
    description: >-
      Starts approvalStatus=draft; cannot be used for production send
      until approved. 08-Notification-APIs.md Section 8.7.2.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [eventType, channel, languageCode, bodyTemplate]
            properties:
              eventType: { type: string }
              channel:
                type: string
                enum: [sms, email, whatsapp, push_mobile, push_web, push_browser, in_app]
              languageCode: { type: string, enum: [ta, en] }
              bodyTemplate: { type: string }
              htmlBodyTemplate: { type: string }
              subjectTemplate: { type: string }
    responses:
      '201':
        description: Template created (version 1, draft).
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/TemplateSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/notification-templates/{templateId}:
  parameters:
    - name: templateId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: notificationGetTemplate
    tags: [Notification]
    summary: Get Notification Template
    description: 08-Notification-APIs.md Section 8.7.3.
    responses:
      '200':
        description: Template detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/TemplateDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  patch:
    operationId: notificationUpdateTemplate
    tags: [Notification]
    summary: Update Notification Template (New Version)
    description: >-
      Optimistic concurrency via expectedVersion; any content change
      re-enters the approval workflow at draft.
      08-Notification-APIs.md Section 8.7.4.
    parameters:
      - $ref: '#/components/parameters/IfMatchHeader'
        allowEmptyValue: false
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required: [expectedVersion]
            properties:
              bodyTemplate: { type: string }
              htmlBodyTemplate: { type: string }
              subjectTemplate: { type: string }
