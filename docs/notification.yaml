/api/v1/notification-templates/{templateId}/submit-for-approval:
  post:
    operationId: notificationSubmitTemplateForApproval
    tags: [Notification]
    summary: Submit Notification Template for Approval
    description: >-
      Moves a draft/rejected template to pending_approval; naturally
      idempotent. 08-Notification-APIs.md Section 8.7.9.
    parameters:
      - name: templateId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              submissionNote: { type: string }
    responses:
      '200':
        description: Template submitted for approval.
        content:
          application/json:
            schema:
              allOf:
