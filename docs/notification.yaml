      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: TEMPLATE_NOT_PENDING_APPROVAL.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notification-preferences/me:
  get:
    operationId: notificationGetMyPreferences
    tags: [Notification]
    summary: Get My Notification Preferences
    description: >-
      Generalizes the Section 3.5 citizen-only shortcut to every user
      type, adding quiet hours/category opt-outs.
      08-Notification-APIs.md Section 8.8.1.
    responses:
      '200':
        description: Preference profile.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PreferenceProfile'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
  patch:
    operationId: notificationUpdateMyPreferences
    tags: [Notification]
    summary: Update My Notification Preferences
    description: >-
      Optimistic concurrency via expectedVersion; category opt-outs
      never suppress Emergency Override. 08-Notification-APIs.md
      Section 8.8.2.
    parameters:
      - $ref: '#/components/parameters/IfMatchHeader'
        allowEmptyValue: false
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required: [expectedVersion]
            properties:
              channels:
                type: array
                items:
                  type: object
                  properties:
                    channel: { type: string }
                    isEnabled: { type: boolean }
              quietHours:
                type: object
                properties:
                  startTime: { type: string }
                  endTime: { type: string }
                  timezone: { type: string }
              languageCode: { type: string, enum: [ta, en] }
              categoryOptOuts:
                type: array
                items: { type: string }
              expectedVersion: { type: integer }
    responses:
      '200':
        description: Preferences updated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PreferenceProfile'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '409':
        description: CONCURRENT_MODIFICATION.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '422':
        description: ALL_CHANNELS_DISABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notification-preferences/{userId}:
  parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: notificationGetUserPreferences
    tags: [Notification]
    summary: Get User Notification Preferences (Admin View)
    description: >-
      Read-only Admin support/troubleshooting view; never permits
      Admin-initiated writes to another user's preferences.
      08-Notification-APIs.md Section 8.8.3.
    responses:
      '200':
        description: Target user's preference profile.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PreferenceProfile'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notification-preferences/{userId}/emergency-override:
  post:
    operationId: notificationSetEmergencyOverride
    tags: [Notification]
    summary: Set Emergency Override
    description: >-
      One-time bypass for this specific dispatch only — never modifies
      the recipient's stored preference row. Most audit-sensitive
      endpoint in Section 8. 08-Notification-APIs.md Section 8.8.4.
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [templateKey, channel, variables, justification]
            properties:
              templateKey: { type: string }
              channel:
                type: string
                enum: [sms, email, whatsapp, push_mobile, push_web, push_browser]
              variables: { type: object }
              justification: { type: string, minLength: 10 }
    responses:
      '202':
        description: Override dispatch queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        notificationDispatchId: { type: string }
                        channel: { type: string }
                        status: { type: string, enum: [queued] }
                        overrideApplied: { type: boolean, enum: [true] }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notifications/queue:
