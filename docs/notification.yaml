      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

components:
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Recommended for send/dispatch-creating operations to prevent
        duplicate delivery on client retry.
      schema:
        type: string
    IfMatchHeader:
      name: If-Match
      in: header
      required: true
      description: >-
        Optimistic-concurrency precondition carrying the caller's
        last-known version, required on the concurrency-guarded
        notification template/preference update endpoints
        (08-Notification-APIs.md Sections 8.7.4, 8.8.2, 8.13.4, 8.14.3).
      schema:
        type: string
  schemas:
    DispatchAck:
      type: object
      properties:
        notificationDispatchId: { type: string }
        channel: { type: string }
        status: { type: string, enum: [queued] }
        providerMessageId: { type: string }
    TestDispatchAck:
      type: object
      properties:
        notificationDispatchId: { type: string }
        channel: { type: string }
        status: { type: string, enum: [queued] }
        isTestSend: { type: boolean, enum: [true] }
    ChannelStatusDetail:
      type: object
      properties:
        notificationDispatchId: { type: string }
        channel: { type: string }
        status: { type: string }
        providerMessageId: { type: string }
        sentAt: { type: string, format: date-time }
        deliveredAt: { type: string, format: date-time }
        openedAt: { type: string, format: date-time }
        readAt: { type: string, format: date-time }
        clickedAt: { type: string, format: date-time }
    InAppNotificationSummary:
      type: object
      properties:
        notificationDispatchId: { type: string }
        templateKey: { type: string }
        renderedTitle: { type: string }
        renderedBody: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        readAt: { type: string, format: date-time }
    InAppNotificationDetail:
      allOf:
        - $ref: '#/components/schemas/InAppNotificationSummary'
        - type: object
          properties:
            linkedEntityType: { type: string }
            linkedEntityId: { type: string }
    TemplateSummary:
      type: object
      properties:
        id: { type: string }
        eventType: { type: string }
        channel: { type: string }
        languageCode: { type: string, enum: [ta, en] }
        version: { type: integer }
        approvalStatus:
          type: string
          enum: [draft, pending_approval, approved, rejected]
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    TemplateDetail:
      allOf:
        - $ref: '#/components/schemas/TemplateSummary'
        - type: object
          properties:
            bodyTemplate: { type: string }
            htmlBodyTemplate: { type: string }
            subjectTemplate: { type: string }
            updatedAt: { type: string, format: date-time }
    TemplateVersion:
      type: object
      properties:
        version: { type: integer }
        approvalStatus: { type: string }
        changedBy:
          $ref: './components/schemas.yaml#/UserReference'
        effectiveFrom: { type: string, format: date-time }
        effectiveTo: { type: [string, "null"], format: date-time }
    PreferenceProfile:
      type: object
      properties:
        channels:
          type: array
