/api/v1/notification-templates/{templateId}/test-send:
  post:
    operationId: notificationTemplateTestSend
    tags: [Notification]
    summary: Test Send Notification Template
    description: >-
      Generic, channel-agnostic test-send wrapper equivalent to the
      channel-specific test-send endpoints (8.2.3/8.3.3/8.4.3/8.5.3).
      08-Notification-APIs.md Section 8.7.8.
    parameters:
      - name: templateId
        in: path
        required: true
        schema: { type: string }
    requestBody:
