/api/v1/notifications/sms:
  post:
    operationId: notificationSendSms
    tags: [Notification]
    summary: Send SMS Notification
    description: >-
      Channel-typed convenience view over the generic notification
      pipeline (08-Notification-APIs.md Section 8.1.1). Blocked if the
      recipient disabled SMS unless priority=emergency.
      08-Notification-APIs.md Section 8.2.1.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [recipientUserId, templateKey, variables]
            properties:
              recipientUserId: { type: string }
              templateKey: { type: string }
              languageCode: { type: string, enum: [ta, en] }
              variables: { type: object }
              priority: { type: string, enum: [normal, high, emergency] }
    responses:
      '202':
        description: SMS queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DispatchAck'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: TEMPLATE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '409':
        description: TEMPLATE_NOT_APPROVED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '422':
        description: CHANNEL_DISABLED_BY_RECIPIENT.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'

/api/v1/notifications/sms/{notificationDispatchId}:
