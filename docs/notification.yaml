                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        id: { type: string }
                        approvalStatus: { type: string, enum: [pending_approval] }
                        submittedAt: { type: string, format: date-time }
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: INVALID_APPROVAL_STATE_TRANSITION.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notification-templates/{templateId}/approval-decision:
  post:
    operationId: notificationRecordTemplateApprovalDecision
    tags: [Notification]
    summary: Record Notification Template Approval Decision
