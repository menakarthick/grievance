      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'

/api/v1/notifications/broadcast:
  post:
    operationId: notificationCreateBroadcast
    tags: [Notification]
    summary: Create Broadcast Notification
    description: >-
      One notification_event fanning out to many notification_dispatch
      rows across a resolved administrative scope. Emergency priority
      behaves as a scope-wide Emergency Override. 08-Notification-
      APIs.md Section 8.13.1.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [scopeType, channels, templateKey, variables]
            properties:
              scopeType:
                type: string
                enum: [ward, zone, district, department, tenant]
              scopeId: { type: string }
              channels:
                type: array
                items: { type: string }
              templateKey: { type: string }
              variables: { type: object }
              priority: { type: string, enum: [normal, high, emergency] }
    responses:
      '202':
        description: Broadcast queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        broadcastId: { type: string }
                        status: { type: string, enum: [queued] }
                        estimatedRecipientCount: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: SCOPE_NOT_FOUND or TEMPLATE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '409':
        description: TEMPLATE_NOT_APPROVED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
  get:
    operationId: notificationListBroadcasts
    tags: [Notification]
    summary: List Broadcasts
    description: 08-Notification-APIs.md Section 8.13.2.
    parameters:
      - name: scopeType
        in: query
        schema: { type: string }
      - name: status
        in: query
        schema: { type: string }
      - $ref: './components/parameters.yaml#/sort'
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, maximum: 100 }
    responses:
      '200':
        description: Broadcast history.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/BroadcastSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/notifications/broadcast/{broadcastId}:
  parameters:
    - name: broadcastId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: notificationGetBroadcastStatus
    tags: [Notification]
    summary: Get Broadcast Status
    description: >-
      Counts are eventually consistent while status=in_progress.
      08-Notification-APIs.md Section 8.13.3.
    responses:
      '200':
        description: Broadcast fan-out status.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/BroadcastDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notifications/broadcast/{broadcastId}/cancel:
  post:
    operationId: notificationCancelBroadcast
    tags: [Notification]
    summary: Cancel Broadcast
    description: >-
      Optimistic concurrency via expectedStatus; already-dispatched
      individual notifications are never recalled.
      08-Notification-APIs.md Section 8.13.4.
    parameters:
      - name: broadcastId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IfMatchHeader'
        allowEmptyValue: false
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason, expectedStatus]
            properties:
              reason: { type: string }
              expectedStatus: { type: string, enum: [queued, in_progress] }
    responses:
      '200':
        description: Broadcast cancelled.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        broadcastId: { type: string }
                        status: { type: string, enum: [cancelled] }
                        recipientsNotYetDispatched: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: BROADCAST_ALREADY_COMPLETED or CONCURRENT_MODIFICATION.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notifications/bulk:
  post:
    operationId: notificationCreateBulkJob
    tags: [Notification]
    summary: Create Bulk Notification Job
    description: >-
      Explicit recipient list (max 5,000/call), distinct from
      Broadcast's resolved administrative scope. Each recipient's own
      preference is respected — no override mode.
      08-Notification-APIs.md Section 8.14.1.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [recipientUserIds, channel, templateKey, variables]
            properties:
              recipientUserIds:
                type: array
                minItems: 1
                maxItems: 5000
                items: { type: string }
              channel: { type: string }
              templateKey: { type: string }
              variables: { type: object }
    responses:
      '202':
        description: Bulk job queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        bulkJobId: { type: string }
                        status: { type: string, enum: [queued] }
                        recipientCount: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: TEMPLATE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '409':
        description: TEMPLATE_NOT_APPROVED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '422':
        description: RECIPIENT_LIST_EXCEEDS_LIMIT.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notifications/bulk/{bulkJobId}:
  parameters:
    - name: bulkJobId
