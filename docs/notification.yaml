/api/v1/notifications/in-app/{notificationDispatchId}/read:
  patch:
    operationId: notificationMarkInAppRead
    tags: [Notification]
    summary: Mark In-App Notification as Read
    description: >-
      Idempotent — marking an already-read notification returns the
      existing readAt unchanged. 08-Notification-APIs.md Section
      8.6.3.
    parameters:
      - name: notificationDispatchId
        in: path
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Notification marked read.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        notificationDispatchId: { type: string }
                        status: { type: string, enum: [read] }
                        readAt: { type: string, format: date-time }
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

