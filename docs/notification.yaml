      - name: channel
        in: query
        schema: { type: string }
      - name: status
        in: query
        schema: { type: string }
      - name: filter[sentAt][gte]
        in: query
        schema: { type: string, format: date-time }
      - name: filter[sentAt][lte]
        in: query
        schema: { type: string, format: date-time }
      - $ref: './components/parameters.yaml#/sort'
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, maximum: 100 }
    responses:
      '200':
        description: Notification history list.
        content:
          application/json:
            schema:
              allOf:
