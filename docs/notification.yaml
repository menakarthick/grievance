    responses:
      '200':
        description: Bulk job cancelled.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        bulkJobId: { type: string }
                        status: { type: string, enum: [cancelled] }
                        recipientsNotYetProcessed: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: JOB_ALREADY_COMPLETED or CONCURRENT_MODIFICATION.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

