/api/v1/notifications/health:
  get:
    operationId: notificationServiceHealth
    tags: [Notification]
    summary: Get Notification Service Health
    description: >-
      Composite provider reachability plus queue health, consistent
      with the /healthz pattern (ARCHITECTURE.md §15).
      08-Notification-APIs.md Section 8.16.1.
    responses:
      '200':
        description: Composite health status.
        content:
          application/json:
