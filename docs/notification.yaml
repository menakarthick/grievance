                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/HistoryItem'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/notifications/history/{notificationDispatchId}:
  parameters:
    - name: notificationDispatchId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: notificationGetHistoryDetail
    tags: [Notification]
    summary: Get Notification History Detail
    description: >-
      Full rendered content only returned to the recipient or a
      scoped-permission Admin. 08-Notification-APIs.md Section
      8.10.2.
    responses:
      '200':
        description: Notification history detail.
        content:
          application/json:
            schema:
              allOf:
