      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/notifications/bulk/{bulkJobId}/cancel:
  post:
    operationId: notificationCancelBulkJob
    tags: [Notification]
    summary: Cancel Bulk Notification Job
    description: >-
      Optimistic concurrency via expectedStatus, same guard as
