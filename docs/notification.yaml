    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [recipientUserId, channel, templateKey, variables]
            properties:
              recipientUserId: { type: string }
              channel: { type: string }
              templateKey: { type: string }
              variables: { type: object }
              scheduledAt: { type: string, format: date-time }
              delaySeconds: { type: integer }
    responses:
      '202':
        description: Notification scheduled.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        notificationDispatchId: { type: string }
                        channel: { type: string }
                        status: { type: string, enum: [queued] }
                        scheduledAt: { type: string, format: date-time }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: TEMPLATE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/notifications/queue/{notificationDispatchId}/cancel:
  post:
    operationId: notificationCancelQueued
    tags: [Notification]
    summary: Cancel Queued Notification
    description: >-
      Terminal state transition, naturally idempotent.
