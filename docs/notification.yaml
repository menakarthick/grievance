/api/v1/notifications/in-app:
  get:
    operationId: notificationListInApp
    tags: [Notification]
    summary: List In-App Notifications
    description: >-
      Self-scoped notification inbox — no userId override, even for
      Admin roles. 08-Notification-APIs.md Section 8.6.1.
    parameters:
      - name: status
        in: query
        schema: { type: string, enum: [unread, read, all], default: all }
      - $ref: './components/parameters.yaml#/sort'
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: In-app notification inbox.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/InAppNotificationSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'

