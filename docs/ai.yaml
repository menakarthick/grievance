/api/v1/ai/speech-to-text:
  post:
    operationId: aiSpeechToText
    tags:
      - AI
    summary: Speech to Text
    description: >-
      Transcribe a citizen voice complaint recording to text (Tamil or
      English). Related AI Agent — Voice Agent. API_SPECIFICATION.md
      Section 5.1.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - fileAssetId
            properties:
              fileAssetId:
                type: string
              languageHint:
                type: string
                enum:
                  - ta
                  - en
    responses:
      '200':
        description: Transcription result.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: './components/schemas.yaml#/AIResult'
                        - type: object
                          properties:
                            transcriptText:
                              type: string
                            detectedLanguage:
                              type: string
                              enum:
                                - ta
                                - en
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        description: FILE_NOT_FOUND.
        content:
          application/json:
            schema:
              $ref: './components/schemas.yaml#/ErrorEnvelope'
      '422':
        description: FILE_NOT_YET_SCANNED.
        content:
          application/json:
            schema:
              $ref: './components/schemas.yaml#/ErrorEnvelope'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/complaint-classification:
  post:
    operationId: aiComplaintClassification
    tags:
      - AI
    summary: Complaint Classification
    description: >-
      Detect category, severity, and language for a complaint's text.
      Related AI Agent — Complaint Agent. API_SPECIFICATION.md Section
      5.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - complaintId
              - text
            properties:
              complaintId:
                type: string
              text:
                type: string
                minLength: 10
                maxLength: 5000
                description: >-
                  Masked upstream (PII masking is mandatory, never
                  caller-controlled — ARCHITECTURE.md §8.2).
    responses:
      '200':
        description: Classification result.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: './components/schemas.yaml#/AIResult'
                        - type: object
                          properties:
                            detectedCategoryId:
                              type: string
                            detectedSeverity:
                              type: string
                            detectedLanguage:
                              type: string
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/priority-prediction:
  post:
    operationId: aiPriorityPrediction
    tags:
      - AI
    summary: Priority Prediction
    description: >-
      Predict a complaint's priority level from its classified category/
      severity/text signal. Related AI Agent — Complaint Agent.
      API_SPECIFICATION.md Section 5.3.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - complaintId
            properties:
              complaintId:
                type: string
    responses:
      '200':
        description: Predicted priority.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: './components/schemas.yaml#/AIResult'
                        - type: object
                          properties:
                            predictedPriority:
                              type: string
                              enum:
                                - low
                                - medium
                                - high
                                - critical
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: CLASSIFICATION_NOT_YET_COMPLETE.
        content:
          application/json:
            schema:
              $ref: './components/schemas.yaml#/ErrorEnvelope'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/department-recommendation:
  post:
    operationId: aiDepartmentRecommendation
    tags:
      - AI
    summary: Department Recommendation
    description: >-
      Recommend the routing department for a complaint. Related AI Agent
      — Complaint Agent. API_SPECIFICATION.md Section 5.4.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - complaintId
            properties:
              complaintId:
                type: string
    responses:
      '200':
        description: Department recommendation.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: './components/schemas.yaml#/AIResult'
                        - type: object
                          properties:
                            recommendedDepartmentId:
                              type: string
                            alternateDepartmentIds:
                              type: array
                              items:
                                type: string
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/officer-assistant/query:
  post:
    operationId: aiOfficerAssistantQuery
    tags:
      - AI
    summary: Officer Assistant Query
    description: >-
      Natural-language conversational query interface for officers.
      Related AI Agent — Officer AI Agent. API_SPECIFICATION.md Section
      5.5.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - queryText
            properties:
              queryText:
                type: string
                minLength: 3
                maxLength: 500
              conversationSessionId:
                type: string
                description: For multi-turn context.
    responses:
      '200':
        description: Assistant response.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        responseText:
                          type: string
                        responseSummary:
                          type: string
                        resultData:
                          description: e.g. a complaint list, a report link.
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '429':
        $ref: './components/responses.yaml#/TooManyRequests'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/analytics/insights:
  get:
    operationId: aiAnalyticsInsights
    tags:
      - AI
      - Reports
    summary: Analytics Insights
    description: >-
      AI-generated trend summaries and predictions. Related AI Agent —
      Analytics Agent. API_SPECIFICATION.md Section 5.6.
    parameters:
      - name: scope
        in: query
        schema:
          type: string
          enum:
            - department
            - district
            - tenant
      - name: periodStart
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: periodEnd
        in: query
        required: true
        schema:
          type: string
          format: date
    responses:
      '200':
        description: Insight summary.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        summaryText:
                          type: string
                        trends:
                          type: array
                          items:
                            type: object
                            properties:
                              metricKey:
                                type: string
                              direction:
                                type: string
                              changePercent:
                                type: number
                        predictions:
                          type: array
                          items:
                            type: object
                            properties:
                              metricKey:
                                type: string
                              predictedValue:
                                type: number
                              confidenceScore:
                                type: number
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'

/api/v1/ai/summarization:
  post:
    operationId: aiSummarization
    tags:
      - AI
    summary: Summarization
    description: >-
      Generate a short AI summary of a complaint or a batch of
      complaints. Related AI Agent — Voice Agent / Analytics Agent.
      API_SPECIFICATION.md Section 5.7.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - sourceType
              - sourceIds
            properties:
              sourceType:
                type: string
                enum:
                  - complaint
                  - complaintBatch
                  - voiceTranscript
              sourceIds:
                type: array
                minItems: 1
                maxItems: 50
                items:
                  type: string
    responses:
      '200':
        description: Summary text.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        summaryText:
                          type: string
                        sourceCount:
                          type: integer
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'

/api/v1/ai/translation:
  post:
    operationId: aiTranslation
    tags:
      - AI
    summary: Translation
    description: >-
      Translate complaint text/labels between Tamil and English on
      demand. Related AI Agent — Complaint Agent / Claude adapter.
      API_SPECIFICATION.md Section 5.8.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - text
              - targetLanguage
            properties:
              text:
                type: string
                minLength: 1
                maxLength: 5000
              sourceLanguage:
                type: string
                enum:
                  - ta
                  - en
                description: Auto-detected if omitted.
              targetLanguage:
                type: string
                enum:
                  - ta
                  - en
    responses:
      '200':
        description: Translated text.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        translatedText:
                          type: string
                        detectedSourceLanguage:
                          type: string
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '503':
        $ref: './components/responses.yaml#/ServiceUnavailable'
      '500':
        $ref: './components/responses.yaml#/InternalServerError'
