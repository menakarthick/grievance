/api/v1/departments:
  get:
    operationId: adminListDepartments
    tags: [Administration]
    summary: List Departments
    description: >-
      List the tenant's department list, for Admin Portal screens and
      routing dropdowns platform-wide. 06-Administration-APIs.md Section
      6.1.1.
    parameters:
      - name: isActive
        in: query
        schema: { type: boolean, default: true }
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: Department list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Department'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
  post:
    operationId: adminCreateDepartment
    tags: [Administration]
    summary: Create Department
    description: >-
      Add a new department to the tenant's configurable department list.
      06-Administration-APIs.md Section 6.1.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code, name]
            properties:
              code:
                type: string
                pattern: '^[A-Z0-9]{2,10}$'
              name:
                type: string
                minLength: 2
                maxLength: 100
    responses:
      '201':
        description: Department created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Department'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '409':
        description: DEPARTMENT_CODE_ALREADY_EXISTS.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/departments/{departmentId}:
  parameters:
    - name: departmentId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: adminGetDepartment
    tags: [Administration]
    summary: Get Department
    description: 06-Administration-APIs.md Section 6.1.3.
    responses:
      '200':
        description: Department detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Department'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  patch:
    operationId: adminUpdateDepartment
    tags: [Administration]
    summary: Update Department
    description: >-
      Rename a department or toggle its active state. code is immutable.
      06-Administration-APIs.md Section 6.1.4.
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name: { type: string, minLength: 2, maxLength: 100 }
              isActive: { type: boolean }
    responses:
      '200':
        description: Department updated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Department'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  delete:
    operationId: adminDeleteDepartment
    tags: [Administration]
    summary: Delete Department (Deactivate)
    description: 06-Administration-APIs.md Section 6.1.5.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

