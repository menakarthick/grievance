components:
  parameters:
    IfMatchHeader:
      name: If-Match
      in: header
      required: true
      description: >-
        Optimistic-concurrency precondition carrying the caller's
        last-known version, required on the versioned-config update
        endpoints (06-Administration-APIs.md Sections 6.6.4, 6.7.4,
        6.8.4).
      schema:
        type: string
  schemas:
    Department:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ComplaintCategory:
      type: object
      properties:
        id: { type: string }
        departmentId: { type: string }
        name: { type: string }
        defaultPriority: { type: string, enum: [low, medium, high, critical] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    StaffUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        userType:
          type: string
          enum: [officer, department_admin, corporation_admin]
        departmentId: { type: string }
        hierarchyLevelId: { type: string }
        employeeId: { type: string }
        roles:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    RoleSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isSystemRole: { type: boolean }
        permissionCount: { type: integer }
        createdAt: { type: string, format: date-time }
    RoleDetail:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isSystemRole: { type: boolean }
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        createdAt: { type: string, format: date-time }
    Permission:
      type: object
      properties:
        id: { type: string }
        resource: { type: string }
        action: { type: string }
        description: { type: string }
    ApprovalWorkflowRule:
      type: object
      properties:
        id: { type: string }
        categoryId: { type: string }
        requiredLevelId: { type: string }
        version: { type: integer }
        effectiveFrom: { type: string, format: date-time }
        effectiveTo: { type: [string, "null"], format: date-time }
    SlaRule:
      type: object
      properties:
        id: { type: string }
        departmentId: { type: string }
        categoryId: { type: string }
        priority: { type: string }
        resolutionHours: { type: integer }
        version: { type: integer }
        effectiveFrom: { type: string, format: date-time }
        effectiveTo: { type: [string, "null"], format: date-time }
    EscalationRule:
      type: object
      properties:
        id: { type: string }
        departmentId: { type: string }
        fromLevelId: { type: string }
        toLevelId: { type: string }
        triggerCondition:
          type: string
          enum: [sla_breach, no_action_after_hours]
        escalateAfterHours: { type: integer }
        version: { type: integer }
    TenantConfig:
      type: object
      properties:
        tenantCode: { type: string }
        tenantName: { type: string }
        defaultLanguage: { type: string, enum: [ta, en] }
        sessionTimeouts:
          type: object
          properties:
            citizen: { type: integer }
            officer: { type: integer }
            admin: { type: integer }
        passwordPolicy:
          type: object
          properties:
            minLength: { type: integer }
            rotationDays: { type: integer }
        reopenWindowDays: { type: integer }
    FeatureFlag:
      type: object
      properties:
        flagKey: { type: string }
        isEnabled: { type: boolean }
        flagType: { type: string }
        updatedAt: { type: string, format: date-time }
    ProviderConfig:
      type: object
      properties:
        providerType:
          type: string
          enum: [ai, voice, sms, whatsapp, email, maps]
        providerName: { type: string }
        isActive: { type: boolean }
        updatedAt: { type: string, format: date-time }
