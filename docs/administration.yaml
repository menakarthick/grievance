/api/v1/users:
  get:
    operationId: adminListUsers
    tags: [Administration]
    summary: List Users
    description: 06-Administration-APIs.md Section 6.3.1.
    parameters:
      - name: userType
        in: query
        schema:
          type: string
          enum: [officer, department_admin, corporation_admin]
      - name: departmentId
        in: query
        schema: { type: string }
      - name: isActive
        in: query
        schema: { type: boolean, default: true }
      - $ref: './components/parameters.yaml#/page'
      - $ref: './components/parameters.yaml#/size'
    responses:
      '200':
        description: User list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/StaffUser'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
  post:
    operationId: adminCreateUser
    tags: [Administration]
    summary: Create User
    description: >-
      Provision an Officer, Department Admin, or Corporation Admin
      account. Citizen accounts self-register via OTP verify, never
      created here. 06-Administration-APIs.md Section 6.3.2.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, name, email, userType, roleIds]
            properties:
              username: { type: string }
              name: { type: string }
              email: { type: string, format: email }
              userType:
                type: string
                enum: [officer, department_admin, corporation_admin]
              departmentId: { type: string }
              hierarchyLevelId: { type: string }
              roleIds:
                type: array
                minItems: 1
                items: { type: string }
              initialPassword:
                type: string
                format: password
                description: Omit to trigger a set-password invite email.
    responses:
      '201':
        description: User created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/StaffUser'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        description: FORBIDDEN — privilege escalation attempt (OWASP A01).
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '409':
        description: USERNAME_ALREADY_EXISTS.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/users/{userId}:
  parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: adminGetUser
    tags: [Administration]
    summary: Get User
    description: 06-Administration-APIs.md Section 6.3.3.
    responses:
      '200':
        description: User detail.
        content:
          application/json:
