              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/StaffUser'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  patch:
    operationId: adminUpdateUser
    tags: [Administration]
    summary: Update User
    description: >-
      username is immutable. 06-Administration-APIs.md Section 6.3.4.
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name: { type: string }
              email: { type: string, format: email }
              departmentId: { type: string }
              hierarchyLevelId: { type: string }
              roleIds:
                type: array
                items: { type: string }
              isActive: { type: boolean }
    responses:
      '200':
        description: User updated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/StaffUser'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
  delete:
    operationId: adminDeleteUser
    tags: [Administration]
    summary: Delete User (Deactivate)
    description: >-
      Triggers an allDevices logout and denylists live tokens.
      06-Administration-APIs.md Section 6.3.5.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '409':
        description: OFFICER_HAS_ACTIVE_ASSIGNMENTS.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

