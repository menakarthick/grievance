/api/v1/audit-logs:
  get:
    operationId: auditListLogs
    tags: [Audit]
    summary: List Audit Logs
    description: >-
      Search the immutable, generic audit trail of every state-changing
      action platform-wide. Results are always excluded of any raw
      citizen PII. 10-Audit-APIs.md Section 10.2.1.
    parameters:
      - name: entityType
        in: query
        schema: { type: string }
      - name: entityId
        in: query
        schema: { type: string }
      - name: actorUserId
        in: query
        schema: { type: string }
      - name: action
        in: query
        schema: { type: string }
      - name: filter[createdAt][gte]
        in: query
        schema: { type: string, format: date-time }
      - name: filter[createdAt][lte]
        in: query
        schema: { type: string, format: date-time }
      - name: sort
        in: query
        schema: { type: string, default: '-createdAt' }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: Audit log list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/AuditLogListItem'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/audit-logs/{auditLogId}:
  parameters:
    - name: auditLogId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: auditGetLog
    tags: [Audit]
    summary: Get Audit Log Detail
    description: >-
      Retrieve full detail for a single audit log entry.
      10-Audit-APIs.md Section 10.2.2.
    responses:
      '200':
        description: Audit log detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuditLogDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

