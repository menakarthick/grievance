      - name: userId
        in: query
        description: Admin only.
        schema: { type: string }
      - name: eventType
        in: query
        schema:
          type: string
          enum: [login, logout, mfa_challenge, failed_attempt, password_reset]
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: Login history list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/LoginHistoryListItem'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

