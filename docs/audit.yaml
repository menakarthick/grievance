                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SecurityEventDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/audit/search:
  get:
    operationId: auditGlobalSearch
    tags: [Audit]
    summary: Global Audit Search
    description: >-
      Free-text/cross-entity search across every specialized audit
      trail in one call, for an investigator who does not yet know
      which specific trail holds the answer. Backed by MySQL FULLTEXT
      in Phase-1, transparently upgraded to OpenSearch/Elasticsearch in
      later phases, with no client-facing contract change. A search
      query is itself logged. 10-Audit-APIs.md Section 10.11.1.
    parameters:
      - $ref: './components/parameters.yaml#/search'
      - name: trails
        in: query
        description: >-
          Comma-separated subset of audit_log, activity_log,
          auth_event_log, config_change_history, workflow, ai_decision,
          notification, file, security.
        schema: { type: string }
      - name: filter[createdAt][gte]
        in: query
        schema: { type: string, format: date-time }
      - name: filter[createdAt][lte]
        in: query
        schema: { type: string, format: date-time }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: Cross-trail search results.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/AuditSearchResultItem'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/audit/export:
  get:
    operationId: auditExport
    tags: [Audit]
    summary: Export Audit Logs
    description: >-
      Export any of the audit trails as CSV/PDF for offline/compliance
      use. Large exports are generated asynchronously via the
      Scheduler; the resulting artifact is a file_asset. Exporting
      audit evidence is itself a mandatory-audited compliance-relevant
      action. 10-Audit-APIs.md Section 10.12.1.
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      - name: trail
        in: query
        required: true
        description: >-
          One of audit_log, activity_log, login_history,
          configuration_changes, workflow, ai_decision, notification,
          file, security_events.
        schema: { type: string }
      - name: format
        in: query
        required: true
        schema: { type: string, enum: [csv, pdf] }
    responses:
      '202':
        description: Export job queued.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: './components/schemas.yaml#/AsyncJob'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '429':
        $ref: './components/responses.yaml#/TooManyRequests'

/api/v1/audit/export/{exportJobId}:
  parameters:
    - name: exportJobId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: auditGetExportStatus
    tags: [Audit]
    summary: Get Audit Export Job Status
    description: >-
      Poll the status of an asynchronous audit export job.
      10-Audit-APIs.md Section 10.12.2.
    responses:
      '200':
        description: Audit export job status.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: './components/schemas.yaml#/ReportExport'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

/api/v1/audit/compliance-reports/{reportType}:
  parameters:
    - name: reportType
      in: path
      required: true
      description: e.g. dpdp-readiness, audit-completeness, owasp-mapping.
      schema: { type: string }
  get:
    operationId: auditGetComplianceReport
    tags: [Audit]
    summary: Get Compliance Report
    description: >-
      Generate a compliance evidence report for a specific framework.
      This report is a structured evidence summary over already-
      approved controls - it does not itself claim certification.
      10-Audit-APIs.md Section 10.13.1.
    parameters:
      - $ref: './components/parameters.yaml#/periodStart'
      - $ref: './components/parameters.yaml#/periodEnd'
    responses:
      '200':
        description: Compliance report.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ComplianceReport'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: REPORT_TYPE_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/audit/compliance-reports:
  get:
    operationId: auditListComplianceReportTypes
    tags: [Audit]
    summary: List Compliance Report Types
    description: >-
      Retrieve the catalog of available compliance report types.
      10-Audit-APIs.md Section 10.13.2.
    responses:
      '200':
        description: Compliance report type catalog.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ComplianceReportType'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/audit/retention-policy:
  get:
    operationId: auditGetRetentionPolicy
    tags: [Audit]
    summary: Get Retention Policy
    description: >-
      Retrieve the tenant's currently effective retention periods per
      data category. Values reflect the fixed periods in
      DATABASE_DESIGN.md Section 23 - not tenant-editable below the SRS
      Section 4.3 floor. 10-Audit-APIs.md Section 10.14.1.
    responses:
      '200':
        description: Retention policy.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/RetentionPolicyRow'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/audit/retention-status:
  get:
    operationId: auditGetRetentionStatus
    tags: [Audit]
    summary: Get Retention Status Report
    description: >-
      Report which records are approaching their retention-expiry purge
      date, for advance visibility before the automated Cleanup Job
      runs. Purely informational - never triggers a purge itself.
      10-Audit-APIs.md Section 10.14.2.
    parameters:
      - name: dataCategory
        in: query
        schema: { type: string }
      - name: withinDays
        in: query
        schema: { type: integer, minimum: 1, maximum: 3650, default: 90 }
    responses:
      '200':
        description: Retention status report.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/RetentionStatusRow'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

/api/v1/audit/dashboard:
  get:
    operationId: auditGetDashboardSummary
    tags: [Audit]
    summary: Get Audit Dashboard Summary
    description: >-
      Composite summary of audit/security posture - recent failed
      logins, lockouts, config changes, AI overrides, and pending
      compliance attention items - for an Admin Portal Audit Dashboard
      landing view. Aggregates across every trail into one landing-page
      summary. 10-Audit-APIs.md Section 10.15.1.
    parameters:
      - $ref: './components/parameters.yaml#/periodStart'
      - $ref: './components/parameters.yaml#/periodEnd'
    responses:
      '200':
        description: Audit dashboard summary.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuditDashboardSummary'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'

components:
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Optional on the Export Audit Logs request to prevent duplicate
        export jobs on client retry (10-Audit-APIs.md Section 10.12.1).
      schema:
        type: string
  schemas:
    AuditLogListItem:
      type: object
      properties:
        id: { type: string }
        actorUserId: { type: [string, "null"] }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        changeSummary: { type: object }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
    AuditLogDetail:
      type: object
      properties:
        id: { type: string }
        actorUserId: { type: [string, "null"] }
        actorName: { type: string }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        changeSummary: { type: object }
        correlationId: { type: string }
        requestId: { type: string }
        createdAt: { type: string, format: date-time }
    ActivityLogListItem:
      type: object
      properties:
        id: { type: string }
        actorUserId: { type: string }
        activityType: { type: string }
        ipAddress: { type: string }
        deviceFingerprint: { type: string }
        userAgent: { type: string }
        createdAt: { type: string, format: date-time }
    ActivityLogDetail:
      type: object
      properties:
        id: { type: string }
        actorUserId: { type: string }
        activityType: { type: string }
        ipAddress: { type: string }
        deviceFingerprint: { type: string }
        userAgent: { type: string }
        sessionId: { type: string }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
    ActivityTimelineItem:
      type: object
      properties:
        activityType: { type: string }
        ipAddress: { type: string }
        createdAt: { type: string, format: date-time }
    LoginHistoryListItem:
      type: object
      properties:
        id: { type: string }
        eventType: { type: string }
        ipAddress: { type: string }
        success: { type: boolean }
        createdAt: { type: string, format: date-time }
    LoginHistoryDetail:
      type: object
      properties:
        id: { type: string }
        eventType: { type: string }
        ipAddress: { type: string }
        deviceFingerprint: { type: string }
        userAgent: { type: string }
        success: { type: boolean }
        failureReason: { type: string }
        sessionId: { type: string }
        createdAt: { type: string, format: date-time }
    FailedLoginAttemptRow:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        failedAttemptCount: { type: integer }
        currentlyLocked: { type: boolean }
        lastAttemptAt: { type: string, format: date-time }
    ConfigChangeListItem:
      type: object
      properties:
        configTableName: { type: string }
        configRowId: { type: string }
        previousVersion: { type: integer }
        newVersion: { type: integer }
        changedBy:
          $ref: './components/schemas.yaml#/UserReference'
        createdAt: { type: string, format: date-time }
    ConfigChangeDetail:
      type: object
      properties:
        configTableName: { type: string }
        configRowId: { type: string }
        previousVersion: { type: object }
        newVersion: { type: object }
        changedBy:
          $ref: './components/schemas.yaml#/UserReference'
        createdAt: { type: string, format: date-time }
    AiDecisionListItem:
      type: object
      properties:
        id: { type: string }
        complaintId: { type: string }
        agentType: { type: string, enum: [complaint, officer_ai, analytics, voice] }
        providerName: { type: string }
        confidenceScore: { type: number, minimum: 0, maximum: 1 }
        piiTypesDetected:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
    AiDecisionDetail:
      type: object
      properties:
        id: { type: string }
        complaintId: { type: string }
        agentType: { type: string, enum: [complaint, officer_ai, analytics, voice] }
        providerName: { type: string }
        promptTokenCount: { type: integer }
        responseTokenCount: { type: integer }
        latencyMs: { type: integer }
        status: { type: string }
        piiTypesDetected:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
    NotificationAuditListItem:
      type: object
      properties:
        notificationDispatchId: { type: string }
        channel: { type: string }
        actorUserId: { type: [string, "null"] }
        wasEmergencyOverride: { type: boolean }
        justification: { type: string }
        createdAt: { type: string, format: date-time }
    NotificationAuditDetail:
      type: object
      properties:
        notificationDispatchId: { type: string }
        channel: { type: string }
        actorUserId: { type: [string, "null"] }
        actorName: { type: string }
        wasEmergencyOverride: { type: boolean }
        justification: { type: string }
        recipientPreferenceAtSendTime: { type: string }
        createdAt: { type: string, format: date-time }
    FileAuditListItem:
      type: object
      properties:
        fileAssetId: { type: string }
        action: { type: string, enum: [upload, download, delete, preview] }
        actorUserId: { type: string }
        ipAddress: { type: string }
        createdAt: { type: string, format: date-time }
    FileAuditDetail:
      type: object
      properties:
        fileAssetId: { type: string }
        action: { type: string, enum: [upload, download, delete, preview] }
        actorUserId: { type: string }
        actorName: { type: string }
        ipAddress: { type: string }
        createdAt: { type: string, format: date-time }
    SecurityEventListItem:
      type: object
      properties:
        eventType: { type: string }
        actorUserId: { type: [string, "null"] }
        targetUserId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    SecurityEventDetail:
      type: object
      properties:
        eventType: { type: string }
        actorUserId: { type: [string, "null"] }
        actorName: { type: [string, "null"] }
        targetUserId: { type: [string, "null"] }
        targetName: { type: [string, "null"] }
        ipAddress: { type: string }
        createdAt: { type: string, format: date-time }
    AuditSearchResultItem:
      type: object
      properties:
        trail: { type: string }
        id: { type: string }
        summary: { type: string }
        actorUserId: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        createdAt: { type: string, format: date-time }
    ComplianceReport:
      type: object
      properties:
        reportType: { type: string }
        generatedAt: { type: string, format: date-time }
        sections:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              status: { type: string, enum: [compliant, attention_required] }
              detail: { type: string }
    ComplianceReportType:
      type: object
      properties:
        reportType: { type: string }
        title: { type: string }
        framework: { type: string, enum: [CERT-In, GIGW, OWASP, DPDP, STQC] }
    RetentionPolicyRow:
      type: object
      properties:
        dataCategory:
          type: string
          enum: [complaint_records, audit_logs, voice_recordings, uploaded_documents]
        retentionYears: { type: integer }
    RetentionStatusRow:
      type: object
      properties:
        dataCategory: { type: string }
        recordCount: { type: integer }
        earliestPurgeDate: { type: string, format: date }
    AuditDashboardSummary:
      type: object
      properties:
        failedLoginCount: { type: integer }
        activeLockoutCount: { type: integer }
        configChangeCount: { type: integer }
        emergencyOverrideCount: { type: integer }
        complianceAttentionItems:
          type: array
          items:
            type: object
            properties:
              reportType: { type: string }
              title: { type: string }
        generatedAt: { type: string, format: date-time }
