      - name: filter[createdAt][gte]
        in: query
        schema: { type: string, format: date-time }
      - name: filter[createdAt][lte]
        in: query
        schema: { type: string, format: date-time }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: Notification audit trail list.
        content:
          application/json:
