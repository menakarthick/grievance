      in: path
      required: true
      schema: { type: string }
  get:
    operationId: auditGetComplaintWorkflowHistory
    tags: [Audit]
    summary: Get Workflow Audit Detail for a Complaint
    description: >-
      Retrieve the complete, unredacted workflow trail for one specific
      complaint - the Admin/investigation-grade counterpart to the
      citizen-facing Complaint Timeline (API_SPECIFICATION.md Section
      4.6). Includes internal-only detail intentionally omitted from
      that citizen-facing view. 10-Audit-APIs.md Section 10.6.2.
    responses:
      '200':
        description: Complaint workflow audit detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        complaintId: { type: string }
                        events:
                          type: array
                          items:
                            $ref: './components/schemas.yaml#/WorkflowStep'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

