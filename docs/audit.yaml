/api/v1/activity-logs/users/{userId}/timeline:
  parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: auditGetUserActivityTimeline
    tags: [Audit]
    summary: Get User Activity Timeline
    description: >-
      Retrieve a single user's full activity history in one aggregated,
      chronological view, for an investigation. Merges activity_log and
      auth_event_log rows for this user into one chronological stream.
      Access is itself an investigation-grade action and is logged.
      10-Audit-APIs.md Section 10.3.3.
    parameters:
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: User activity timeline.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ActivityTimelineItem'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'

