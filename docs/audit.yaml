    parameters:
      - name: actorUserId
        in: query
        schema: { type: string }
      - name: activityType
        in: query
        schema: { type: string }
      - name: ipAddress
        in: query
        schema: { type: string }
      - name: filter[createdAt][gte]
        in: query
        schema: { type: string, format: date-time }
      - name: filter[createdAt][lte]
        in: query
        schema: { type: string, format: date-time }
      - $ref: './components/parameters.yaml#/cursor'
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    responses:
      '200':
        description: Activity log list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ActivityLogListItem'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
