    operationId: auditListLoginHistory
    tags: [Audit]
    summary: List Login History
    description: >-
      View login/logout/MFA/failed-attempt/password-reset event history
      for a user. Non-Admin callers are always scoped to their own
      userId regardless of any userId supplied. 10-Audit-APIs.md
      Section 10.4.1.
