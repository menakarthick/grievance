                          latitude: { type: number }
                          longitude: { type: number }
                          complaintCount: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/geo/analytics:
  get:
    operationId: geoAnalyticsSummary
    tags: [Geographic]
    summary: Geo Analytics Summary
    description: >-
      Complaint density and category breakdown per ward/zone/division
      for a period. 07-Geographic-APIs.md Section 7.15.1.
    parameters:
      - name: orgUnitLevel
        in: query
        schema:
          type: string
          enum: [ward, zone, division]
      - name: periodStart
        in: query
        required: true
        schema: { type: string, format: date }
      - name: periodEnd
        in: query
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Geo analytics summary.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          orgUnitId: { type: string }
                          orgUnitName: { type: string }
                          complaintCount: { type: integer }
                          categoryBreakdown:
                            type: array
                            items:
                              type: object
                              properties:
                                categoryName: { type: string }
                                count: { type: integer }
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/geo/boundaries:
  get:
    operationId: geoListBoundaries
    tags: [Geographic]
    summary: List Boundaries
    description: >-
      Every administrative unit that currently has a stored boundary.
      07-Geographic-APIs.md Section 7.16.1.
    parameters:
      - name: boundaryEntityType
        in: query
        schema:
          type: string
          enum: [ward, zone, district, org_unit]
      - $ref: './components/parameters.yaml#/page'
      - name: size
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    responses:
      '200':
        description: Boundary list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/GeoBoundarySummary'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

/api/v1/geo/boundaries/{orgUnitId}:
  parameters:
    - name: orgUnitId
      in: path
      required: true
      schema: { type: string }
  get:
    operationId: geoGetBoundary
    tags: [Geographic]
    summary: Get Boundary
    description: >-
      GeoJSON polygon boundary for map rendering.
      07-Geographic-APIs.md Section 7.16.2.
    responses:
      '200':
        description: Boundary detail.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/GeoBoundaryDetail'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
  put:
    operationId: geoReplaceBoundary
    tags: [Geographic]
    summary: Create/Replace Boundary
    description: >-
      Full-replace of a boundary's GeoJSON — a singleton attribute of
      its owning entity, not an independently addressable collection
      member. 07-Geographic-APIs.md Section 7.16.3.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [boundaryGeoJson]
            properties:
              boundaryGeoJson:
                type: object
                description: GeoJSON Polygon or MultiPolygon.
              source:
                type: string
    responses:
      '200':
        description: Boundary created or replaced.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/GeoBoundarySummary'
      '400':
        description: VALIDATION_ERROR, including malformed GeoJSON.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        description: ORG_UNIT_NOT_FOUND.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }
  delete:
    operationId: geoDeleteBoundary
    tags: [Geographic]
    summary: Delete Boundary
    description: 07-Geographic-APIs.md Section 7.16.4.
    responses:
      '204':
        $ref: './components/responses.yaml#/NoContent'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '404':
        $ref: './components/responses.yaml#/NotFound'
      '501':
        description: NOT_ENABLED.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

components:
  schemas:
    State:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        countryCode: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    District:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Zone:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        districtId: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    Ward:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        zoneId: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    OrgUnitNode:
      type: object
      description: >-
        Shared shape for the Corporation/Region/Division convenience
        views over the generic org_unit entity (DATABASE_DESIGN.md
        §28); orgUnitType distinguishes which level a given row is.
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        orgUnitType:
          type: string
          enum: [corporation, region, division]
        parentOrgUnitId: { type: [string, "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    Street:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        wardId: { type: string }
        localityId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    Locality:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        wardId: { type: string }
        createdAt: { type: string, format: date-time }
    GisHierarchyNode:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        orgUnitType: { type: string }
        hasBoundary: { type: boolean }
        children:
          type: array
          items:
            $ref: '#/components/schemas/GisHierarchyNode'
    GeoBoundarySummary:
      type: object
      properties:
        boundaryEntityType: { type: string }
        boundaryEntityId: { type: string }
        centroidLatitude: { type: number }
        centroidLongitude: { type: number }
        version: { type: integer }
        updatedAt: { type: string, format: date-time }
    GeoBoundaryDetail:
      type: object
      properties:
        boundaryEntityType: { type: string }
        boundaryEntityId: { type: string }
        boundaryGeoJson:
          type: object
          description: GeoJSON Polygon or MultiPolygon.
        centroidLatitude: { type: number }
        centroidLongitude: { type: number }
        version: { type: integer }
