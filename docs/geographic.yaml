/api/v1/geo/states:
  get:
    operationId: geoListStates
    tags: [Geographic]
    summary: List States
    description: >-
      Shared civil-geography State catalog (reference_value, domain
      STATE). 07-Geographic-APIs.md Section 7.1.1.
    parameters:
      - name: countryCode
        in: query
        schema: { type: string, default: IN }
      - name: isActive
        in: query
        schema: { type: boolean, default: true }
      - $ref: './components/parameters.yaml#/page'
      - name: size
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    responses:
      '200':
        description: State list.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/State'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
  post:
    operationId: geoCreateState
    tags: [Geographic]
    summary: Create State
    description: >-
      Super Admin only — global catalog, not tenant-scoped
      (DATABASE_DESIGN.md §33 Master Data Governance).
      07-Geographic-APIs.md Section 7.1.3.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code, name]
            properties:
              code: { type: string }
              name: { type: string, minLength: 2, maxLength: 100 }
              countryCode: { type: string, default: IN }
    responses:
      '201':
        description: State created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: './components/schemas.yaml#/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/State'
      '400':
        $ref: './components/responses.yaml#/ValidationError'
      '401':
        $ref: './components/responses.yaml#/Unauthorized'
      '403':
        $ref: './components/responses.yaml#/Forbidden'
      '409':
        description: STATE_CODE_ALREADY_EXISTS.
        content:
          application/json:
            schema: { $ref: './components/schemas.yaml#/ErrorEnvelope' }

