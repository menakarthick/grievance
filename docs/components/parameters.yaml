page:
  name: page
  in: query
  description: >-
    1-indexed page number for offset pagination, used on small, bounded
    admin/config collections (API_SPECIFICATION.md Section 1.8) - e.g.
    departments, roles, wards, notification templates. Not used together
    with `cursor` on the same operation; an operation supports exactly one
    pagination style.
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1
  example: 1

size:
  name: size
  in: query
  description: >-
    Items per page for offset pagination (API_SPECIFICATION.md Section
    1.8). The maximum allowed value is documented per endpoint (typically
    100-200); a value above that ceiling returns 400 Validation Error
    (13-HTTP-Status-Codes.md Section 13.4.1).
  required: false
  schema:
    type: integer
    minimum: 1
    default: 20
  example: 20

cursor:
  name: cursor
  in: query
  description: >-
    Opaque keyset-pagination cursor encoding the last-seen sort key,
    returned as `meta.pagination.nextCursor` by the previous page
    (API_SPECIFICATION.md Section 1.8; 12-Standard-Response-Formats.md
    Section 12.3). Used on high-volume, time-ordered collections -
    complaints, audit logs, activity logs, notification history - to avoid
    the OFFSET performance cliff on month-partitioned tables
    (DATABASE_DESIGN.md Section 19). Must be treated as opaque and never
    constructed client-side; a tampered or unrecognized cursor returns 400
    Validation Error with error.code `INVALID_CURSOR`.
  required: false
  schema:
    type: string
  example: eyJpZCI6ImNtcF84ODI5MSJ9

sort:
  name: sort
  in: query
  description: >-
    Comma-separated list of sortable field names, each optionally prefixed
    with `-` for descending order, ascending by default (e.g.
    `-createdAt,priority`) (API_SPECIFICATION.md Section 1.9). Each
    endpoint publishes its own explicit sortable-field allow-list; an
    unrecognized field returns 400 Validation Error, never a silent ignore.
    This is the platform's primary sort-direction mechanism; see also
    `order` for endpoints that expose field and direction as separate
    parameters.
  required: false
  schema:
    type: string
    example: "-createdAt,priority"
  example: "-createdAt,priority"

order:
  name: order
  in: query
  description: >-
    Explicit sort direction, provided as a complementary, optional
    parameter for endpoints that expose sort field and direction
    separately rather than combined into a single `sort` value. The
    platform's primary, documented convention (API_SPECIFICATION.md
    Section 1.9) encodes direction as a leading `-`/`+` inside `sort`
    itself; `order` is offered as a standalone direction indicator for
    generic or future use alongside `sort`, never as a contradicting
    second mechanism on the same field.
  required: false
  schema:
    type: string
    enum:
      - asc
      - desc
    default: asc
  example: asc

search:
  name: q
  in: query
  description: >-
    Free-text search term. Maps to the `q` query parameter defined in
    API_SPECIFICATION.md Section 1.11 - backed by MySQL FULLTEXT in
    Phase-1, transparently upgraded to OpenSearch/Elasticsearch in later
    phases (DATABASE_DESIGN.md Section 31) with no client-facing contract
    change. Always narrows, never widens, the result set already
    constrained by tenant scope and any other filters on the same
    endpoint. The reusable component is named `search` for library
    discoverability; the wire-level parameter name remains `q`.
  required: false
  schema:
    type: string
    minLength: 1
  example: streetlight

include:
  name: include
  in: query
  description: >-
    Comma-separated list of related-entity names to expand inline in the
    response (e.g. `?include=assignedOfficer,department`), complementary
    to the dot-notation relation expansion already defined for sparse
    fieldsets in API_SPECIFICATION.md Section 1.12 (`?fields=id,status,
    assignedOfficer.name`). Each endpoint documents its own includable-
    relation allow-list; an unrecognized value returns 400 Validation
    Error, consistent with the platform's filter/sort allow-list discipline
    (API_SPECIFICATION.md Sections 1.9-1.10).
  required: false
  schema:
    type: string
  example: assignedOfficer,department

status:
  name: status
  in: query
  description: >-
    Status filter, scoped to whichever status vocabulary the endpoint
    documents (e.g. complaint status label, notification dispatch status,
    file virus-scan status) - see API_SPECIFICATION.md Section 8.13 for
    an example on the notification queue/history endpoints. Each endpoint
    publishes its own explicit status allow-list; an unrecognized value
    returns 400 Validation Error, consistent with the platform's
    filter/sort allow-list discipline (API_SPECIFICATION.md Sections
    1.9-1.10).
  required: false
  schema:
    type: string
  example: Delivered

departmentId:
  name: departmentId
  in: query
  description: >-
    Department identifier filter, used across Administration, Reports,
    and Complaint list endpoints (06-Administration-APIs.md Section
    6.1.3) to scope results to a single department. Also used as a path
    parameter on department-scoped resource endpoints, in which case `in`
    is `path` and `required` is `true`.
  required: false
  schema:
    type: string
  example: dept_engineering

wardId:
  name: wardId
  in: query
  description: >-
    Ward identifier filter, used across Geographic, Reports, and
    Complaint list endpoints (07-Geographic-APIs.md Section 7.7.5) to
    scope results to a single ward. Also used as a path parameter on
    ward-scoped resource endpoints, in which case `in` is `path` and
    `required` is `true`.
  required: false
  schema:
    type: string
  example: ward_014

zoneId:
  name: zoneId
  in: query
  description: >-
    Zone identifier filter, used across Geographic and Reports list
    endpoints (07-Geographic-APIs.md Section 7.7) to scope results to a
    single zone. Also used as a path parameter on zone-scoped resource
    endpoints, in which case `in` is `path` and `required` is `true`.
  required: false
  schema:
    type: string
  example: zone_03

divisionId:
  name: divisionId
  in: query
  description: >-
    Division identifier filter, used across Geographic list endpoints
    (07-Geographic-APIs.md Section 7.7) to scope results to a single
    division. Also used as a path parameter on division-scoped resource
    endpoints, in which case `in` is `path` and `required` is `true`.
  required: false
  schema:
    type: string
  example: div_02

complaintId:
  name: complaintId
  in: path
  description: >-
    Complaint identifier, used as a path parameter across the Complaint,
    Audit, and Reports drill-down endpoints (API_SPECIFICATION.md
    Section 4.5). Also used as a query-parameter filter on cross-cutting
    list endpoints (e.g. audit workflow-history), in which case
    `required` is `false`.
  required: true
  schema:
    type: string
  example: cmp_88291

officerId:
  name: officerId
  in: query
  description: >-
    Officer identifier filter, used on Reports officer-performance
    endpoints (09-Reports-APIs.md Section 9.5) to scope results to a
    single officer. Also used as a path parameter on the officer
    drill-down endpoint, in which case `in` is `path` and `required` is
    `true`.
  required: false
  schema:
    type: string
  example: usr_officer_221

periodStart:
  name: periodStart
  in: query
  description: >-
    Inclusive start date of the reporting period, required alongside
    `periodEnd` on every Reports analytics endpoint (09-Reports-APIs.md
    Section 9.3.1 and throughout Section 9).
  required: true
  schema:
    type: string
    format: date
  example: '2026-07-01'

periodEnd:
  name: periodEnd
  in: query
  description: >-
    Inclusive end date of the reporting period, required alongside
    `periodStart` on every Reports analytics endpoint
    (09-Reports-APIs.md Section 9.3.1 and throughout Section 9).
  required: true
  schema:
    type: string
    format: date
  example: '2026-07-20'

reportFormat:
  name: format
  in: query
  description: >-
    Export file format for the Reports Export (09-Reports-APIs.md
    Section 9.10.1) and Audit Export (10-Audit-APIs.md Section 10.12.1)
    endpoints. The Audit export endpoint documents a narrower allow-list
    (`csv`, `pdf` only - no `xlsx`); each endpoint's own documentation is
    authoritative for its allowed subset. The reusable component is
    named `reportFormat` for library discoverability; the wire-level
    parameter name remains `format`.
  required: true
  schema:
    type: string
    enum:
      - csv
      - pdf
      - xlsx
  example: csv
